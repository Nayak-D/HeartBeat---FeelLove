<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeartBeat Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        @keyframes pulse-ring {
            0% { transform: scale(.33); opacity: 1; }
            80%, 100% { opacity: 0; }
        }

        .pulse-animation {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        /* Responsive High-Fidelity Mobile Frame */
        .device-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            padding: 10px;
            box-sizing: border-box;
        }

        .device-container {
            position: relative;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 4.5rem;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8), 
                        inset 0 0 2px 1px rgba(255,255,255,0.1),
                        0 0 0 4px rgba(255,255,255,0.02);
            height: 95vh;
            max-height: 880px;
            width: auto;
            aspect-ratio: 410 / 880;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mobile-frame {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            border-radius: 3.8rem;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Glass Glare Overlay */
        .glass-glare {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.02) 100%);
            pointer-events: none;
            z-index: 100;
            border-radius: 3.8rem;
        }

        /* Hardware Buttons */
        .side-button {
            position: absolute;
            background: #2a2a2a;
            border-radius: 2px;
            z-index: 1;
        }

        .volume-up { width: 3px; height: 6%; left: -3px; top: 18%; }
        .volume-down { width: 3px; height: 6%; left: -3px; top: 25%; }
        .power-btn { width: 3px; height: 10%; right: -3px; top: 22%; }

        @media (max-width: 450px) or (max-height: 600px) {
            .device-wrapper {
                padding: 0;
            }
            .device-container {
                padding: 0;
                background: transparent;
                border-radius: 0;
                box-shadow: none;
                width: 100%;
                height: 100%;
                max-width: none;
                max-height: none;
                aspect-ratio: auto;
                border: none;
            }
            .mobile-frame {
                width: 100% !important;
                height: 100% !important;
                border-radius: 0;
            }
            .side-button, .glass-glare { display: none; }
        }

        /* Home Indicator */
        .home-indicator {
            width: 35%;
            height: 5px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        /* Dynamic Island */
        .dynamic-island {
            width: 30%;
            height: 32px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Custom Logo Glow Style */
        #main-logo {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #main-logo.logo-glow {
            color: #ff2d55 !important;
            text-shadow: 0 0 20px rgba(255, 45, 85, 0.8), 0 0 40px rgba(255, 45, 85, 0.4);
            transform: scale(1.1);
        }
    </style>
<script type="importmap">

</html>
